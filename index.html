<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }
        </script><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>铅球投掷模拟器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f0f0f0; }
        .controls { margin-bottom: 20px; }
        .slider { width: 200px; margin: 0 10px; }
        .data { margin-top: 20px; font-size: 16px; }
    </style>
</head>
<body>
    <h2>铅球投掷模拟器</h2>
    <div class="controls">
        初始速度 (m/s): <input type="range" id="speed" min="10" max="20" value="15" class="slider" oninput="updateParams()">
        <span id="speedValue">15</span><br>
        投掷角度 (度): <input type="range" id="angle" min="0" max="90" value="45" class="slider" oninput="updateParams()">
        <span id="angleValue">45</span><br>
        保留轨迹次数: <input type="number" id="maxTraces" min="1" max="5" value="3" style="width: 60px;" oninput="updateParams()"><br>
        <button onclick="resetSimulation()">重置</button>
        <button onclick="startSimulation()">开始模拟</button>
    </div>
    <div class="data">
        最大高度: <span id="maxHeight">0.00</span> m<br>
        投掷距离: <span id="distance">0.00</span> m<br>
        飞行时间: <span id="time">0.00</span> s
    </div>
    <script>
        let speed = 15;
        let angle = 45;
        let g = 9.81;
        let maxHeight = 0;
        let distance = 0;
        let flightTime = 0;
        let currentTime = 0;
        let isAnimating = false;
        let trace = [];
        let traces = []; // 存储多次轨迹
        let maxTraces = 3; // 默认保留 3 次轨迹

        function setup() {
            createCanvas(400, 300); // 缩小画布尺寸
            updateParams();
        }

        function draw() {
            background(220);
            translate(30, height - 30); // 调整坐标原点，减少边距
            scale(1, -1); // Y轴向上

            // 绘制地面
            stroke(0);
            line(0, 0, width - 60, 0); // 调整地面长度

            // 绘制所有历史轨迹
            traces.forEach((t, index) => {
                stroke(t.color);
                noFill();
                beginShape();
                t.points.forEach(pt => vertex(pt.x * 10, pt.y * 5));
                endShape();
            });

            if (isAnimating && currentTime <= flightTime) {
                let t = currentTime;
                let x = speed * Math.cos(angle * Math.PI / 180) * t;
                let y = speed * Math.sin(angle * Math.PI / 180) * t - 0.5 * g * t * t;
                trace.push({ x, y });
                if (y > maxHeight) maxHeight = y;

                // 绘制当前铅球
                fill(100);
                noStroke();
                ellipse(x * 10, y * 5, 8, 8); // 缩小铅球尺寸

                currentTime += 0.05; // 加快动画速度
                if (currentTime > flightTime) {
                    isAnimating = false;
                    distance = speed * Math.cos(angle * Math.PI / 180) * flightTime;
                    // 保存当前轨迹
                    traces.push({
                        points: [...trace],
                        color: getColor(traces.length)
                    });
                    if (traces.length > maxTraces) traces = []; // 超过最大次数清空
                    updateData();
                }
            } else if (!isAnimating && trace.length > 0) {
                // 绘制当前轨迹的最终位置
                let finalX = trace[trace.length - 1].x;
                let finalY = trace[trace.length - 1].y;
                fill(100);
                ellipse(finalX * 10, finalY * 5, 8, 8);
            }
        }

        function updateParams() {
            speed = parseFloat(document.getElementById('speed').value);
            angle = parseFloat(document.getElementById('angle').value);
            maxTraces = parseInt(document.getElementById('maxTraces').value);
            document.getElementById('speedValue').innerText = speed;
            document.getElementById('angleValue').innerText = angle;

            // 计算飞行时间等参数但不显示
            flightTime = (2 * speed * Math.sin(angle * Math.PI / 180)) / g;
            maxHeight = (speed * speed * Math.sin(angle * Math.PI / 180) * Math.sin(angle * Math.PI / 180)) / (2 * g);
            distance = speed * Math.cos(angle * Math.PI / 180) * flightTime;
            currentTime = 0;
            trace = [];
            // 清空数据面板
            document.getElementById('maxHeight').innerText = '0.00';
            document.getElementById('distance').innerText = '0.00';
            document.getElementById('time').innerText = '0.00';
        }

        function startSimulation() {
            if (!isAnimating) {
                currentTime = 0;
                trace = [];
                maxHeight = 0; // 重置最大高度
                isAnimating = true;
                loop(); // 启动动画循环
            }
        }

        function resetSimulation() {
            isAnimating = false;
            currentTime = 0;
            maxHeight = 0;
            distance = 0;
            flightTime = 0;
            trace = [];
            traces = []; // 清空所有轨迹
            document.getElementById('maxHeight').innerText = '0.00';
            document.getElementById('distance').innerText = '0.00';
            document.getElementById('time').innerText = '0.00';
            noLoop(); // 停止动画
            background(220); // 清空画布
            updateParams();
        }

        function updateData() {
            document.getElementById('maxHeight').innerText = maxHeight.toFixed(2);
            document.getElementById('distance').innerText = distance.toFixed(2);
            document.getElementById('time').innerText = flightTime.toFixed(2);
        }

        function getColor(index) {
            const colors = ['#FF5733', '#33FF57', '#5733FF', '#FF33A1', '#33FFF7'];
            return colors[index % colors.length]; // 循环使用颜色
        }
    </script>
</body>
</html>
